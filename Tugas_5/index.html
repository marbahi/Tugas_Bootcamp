<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopNow - E-Commerce</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4" href="#" id="brand-link">ShopNow</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="d-flex ms-auto gap-3 align-items-center w-100 w-lg-auto flex-column flex-lg-row px-2 px-lg-0 mt-3 mt-lg-0">
          <div class="dropdown w-100 w-lg-auto">
            <button class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown" id="filterDropdown">
              Filter: Semua
            </button>
            <ul class="dropdown-menu" id="filter-menu">
              <li><a class="dropdown-item" href="#" data-category="all">Semua</a></li>
              <li><a class="dropdown-item" href="#" data-category="Elektronik">Elektronik</a></li>
              <li><a class="dropdown-item" href="#" data-category="Pakaian">Pakaian</a></li>
              <li><a class="dropdown-item" href="#" data-category="Makanan">Makanan</a></li>
            </ul>
          </div>
          <div class="input-group w-100">
            <input type="text" class="form-control" id="searchInput" placeholder="Cari produk...">
            <button class="btn btn-outline-light" type="button" id="searchBtn">Cari</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row" id="product-list"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
